{% extends 'base/base.html' %}
{% block body %}
<div class="auth-container">
    <div class="auth-card">
        <h3>Digite a nova senha</h3>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="auth-submit-btn">Salvar Nova Senha</button>
        </form>
    </div>
</div>
{% endblock %}
